version: "2"
authtoken: your_auth_token_here  # 需要替换为实际的ngrok token
tunnels:
  frontend:
    addr: 8081
    proto: http
    host_header: "localhost:8081"
    bind_tls: true
    
  backend:
    addr: 8080
    proto: http
    host_header: "localhost:8080"
    bind_tls: true
    
  mysql:
    addr: 3306
    proto: tcp
    
  redis:
    addr: 6379
    proto: tcp
