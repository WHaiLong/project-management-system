version: '3.8'

services:
  # 后端服务
  backend:
    build: ./backend
    container_name: project-management-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/project_management?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
      - SPRING_DATASOURCE_USERNAME=pm_user
      - SPRING_DATASOURCE_PASSWORD=Pm@123456
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - project-network

  # 前端服务
  frontend:
    build: ./frontend/project-management-frontend
    container_name: project-management-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - project-network

  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: project-management-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: project_management
      MYSQL_USER: pm_user
      MYSQL_PASSWORD: Pm@123456
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./创建数据库.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    networks:
      - project-network

  # Redis缓存
  redis:
    image: redis:6-alpine
    container_name: project-management-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - project-network

  # Nginx反向代理（可选，用于HTTPS）
  nginx:
    image: nginx:alpine
    container_name: project-management-nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - project-network

volumes:
  mysql_data:
  redis_data:

networks:
  project-network:
    driver: bridge
