# 项目端口
server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Spring配置
spring:
  # 应用名称
  application:
    name: project-management-backend
  
  # 开发环境配置
  profiles:
    active: dev
  
  # Servlet配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  
  # 消息编码
  messages:
    encoding: UTF-8
    basename: i18n/messages
  
  # 资源处理
  resources:
    static-locations: classpath:/static/,classpath:/public/,file:${ruoyi.profile}

# MyBatis配置
mybatis-plus:
  # 搜索指定包别名
  typeAliasesPackage: com.project.management.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml
  global-config:
    # 逻辑删除配置
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 2
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    com.project.management: debug
    org.springframework: info
  file:
    name: logs/project-management-backend.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

# 项目配置
ruoyi:
  # 名称
  name: 项目管理系统后端
  # 版本
  version: 1.0.0
  # 版权年份
  copyrightYear: 2026
  # 实例演示开关
  demoEnabled: true
  # 文件路径
  profile: ${user.home}/project-management/upload
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math
