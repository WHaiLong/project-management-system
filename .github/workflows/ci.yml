name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: project_management_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      
      redis:
        image: redis:6-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
    
    - name: Build Backend
      working-directory: ./backend
      run: |
        chmod +x mvnw
        ./mvnw clean compile -DskipTests
    
    - name: Run Backend Tests
      working-directory: ./backend
      run: |
        ./mvnw test
    
    - name: Build Frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build
    
    - name: Run Frontend Tests
      working-directory: ./frontend
      run: |
        npm test
    
    - name: Code Coverage
      uses: codecov/codecov-action@v3
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: |
          backend/target/surefire-reports/
          frontend/test-results/
    
    - name: Security Scan
      uses: actions/dependency-review-action@v3
    
    - name: Build Docker Images
      run: |
        docker build -t project-management-backend:latest -f backend/Dockerfile backend/
        docker build -t project-management-frontend:latest -f frontend/Dockerfile frontend/
